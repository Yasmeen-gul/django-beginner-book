<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="view" content="width=device-width, initial-scale=1">
    <title>{% block title %}Newspaper App{% endblock title %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/
            bootstrap.min.css" rel="integrity=sha384...." crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'home' %}">Newspaper</a>
            <button class="navbar-togglera" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-1b-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    {% if user.is_authenticated %}
                    <li><a href="#" class="nav-linkpx-2 link-dark">+ New</a></li>
                </ul>
                <div class="mr-auto">
                    <ul class="navbar-nev">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                                aria-expand="false">
                                {{ user.username }}
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="{% url 'password_change' %}">Change password</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li>
                                    <form method="post" action="{% url 'logout' %}" style="display:inline;">
                                        {% csrf_token %}
                                        <button type="submit" class="btn btn-link nav-link"
                                            style="display:inline; cursor:pointer;">Logout</button>

                                    </form>
                                </li>

                            </ul>
                        </li>
                        {% else %}
                    </ul>
                </div>
                <div class="mr-auto">
                    <form class="form d-flex">
                        <a href="{% url 'login' %}" class="btn btn-outline-secondsry">Log in</a>
                        <a href="{% url 'signup' %}" class="btn btn-primary ms-2">Sign up</a>

                    </form>

                </div>
                {% endif %}

            </div>
        </div>
    </nav>
    <main>
        <div class="container">
            {% block content %}
            {% endblock content %}
        </div>
    </main>
    <script scr="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/
          bootstrap.bundle.min.js" integrity="sha384..." crossorigin="anonymous"></script>
</body>

</html>
